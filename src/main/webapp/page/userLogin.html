<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amici De Gusto</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/userLogin.css">
</head>
<body>

<div class="container">

    <!-- LEFT LOGIN -->
    <div class="login-panel">
        <h3>Welcome back</h3>
        <h1>Amici De Gusto</h1>

        <div class="input-box">
            <label>EMAIL ADDRESS</label>
            <input type="email" placeholder="gmail.com">
        </div>

        <div class="input-box">
            <label>PASSWORD</label>
            <input type="password" placeholder="password">
        </div>

        <div class="options">
            <input type="checkbox"> Remember me
        </div>

        <button>LOGIN</button>

        <p class="forgot">
            Forgot password? <span>Request access from gmail</span>
        </p>
    </div>

    <!-- ════════════════════════════════
          RIGHT PANEL — Transparent (shows blurred bg)
          ════════════════════════════════ -->
    <div class="panel-right">

        <!-- Floating Kitchen Ready card -->
        <div class="kitchen-card">
            <div class="kitchen-badge">
                <svg class="kitchen-badge-icon" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M9 12l2 2 4-4"/>
                </svg>
                <span class="kitchen-badge-text">Kitchen Ready</span>
            </div>
            <p class="kitchen-desc">
                Quality control and fresh ingredient tracking are active across all stations.
            </p>
        </div>


    </div>

</body>
</html>
