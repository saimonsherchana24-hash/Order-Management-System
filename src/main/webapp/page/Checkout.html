<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Checkout - Amici de Gusto</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/Checkout.css">

</head>

<body>

<header>
    <div class="logo">
        <a href="home.link" class="home-btn"><i class="fa-solid fa-house"></i></a>
        <div class="app-name">Amici de Gusto</div>
    </div>
    <i class="fa-solid fa-utensils"></i>
</header>

<div class="title">Checkout</div>

<form action="Confirmation.jsp" method="post" onsubmit="return validateForm()">

<div class="container">

<div class="left">

    <div class="box">
        <h3>Order Type</h3>

        <div class="option">
            <div class="card active" onclick="selectOrder('dine')">
                🍽️ <br><b>Dine-In</b>
                <p>Order from your table</p>
            </div>

            <div class="card" onclick="selectOrder('takeaway')">
                📦 <br><b>Takeaway</b>
                <p>Pick up your order</p>
            </div>
        </div>
    </div>

    <div class="box">
        <h3>Your Information</h3>

        <label>Name</label>
        <input type="text" id="name" name="name" placeholder="Your name"
               pattern="[A-Za-z ]+" title="Only letters allowed" required>

        <label>Phone</label>
        <input type="text" id="phone" name="phone" placeholder="Phone number"
               pattern="[0-9]{10}" maxlength="10"
               title="Enter exactly 10 digits" required>

        <div id="dineInfo">
            <label>Table Number</label>
            <input type="text" name="tableNumber" placeholder="e.g., 12">
        </div>

        <div id="takeawayInfo" style="display:none;">
            <label>Delivery Address</label>
            <input type="text" id="address" name="address" placeholder="Enter address"
                   pattern="[A-Za-z ]+" title="Only letters allowed">
        </div>

        <label>Special Instructions</label>
        <textarea name="instructions" rows="4"></textarea>

        <input type="hidden" id="orderType" name="orderType" value="dine">
        <input type="hidden" id="paymentType" name="paymentType" value="card">

    </div>

    <div class="box">
        <h3>Payment Method</h3>

        <div class="payment">
            <div class="paybox active" onclick="selectPay(0)">
                <i class="fa-solid fa-credit-card"></i>
                <b>Card</b>
            </div>

            <div class="paybox" onclick="selectPay(1)">
                <i class="fa-solid fa-money-bill"></i>
                <b>Cash</b>
            </div>

            <div class="paybox" onclick="selectPay(2)">
                <i class="fa-solid fa-globe"></i>
                <b>Online</b>
            </div>
        </div>
    </div>

</div>

<div class="right">
    <div class="box">
        <h3>Order Summary</h3>

        <div class="summary-item">
            <span>Spaghetti Carbonara</span>
            <span>$16.99</span>
        </div>

        <div class="summary-item">
            <span>Subtotal</span>
            <span>$16.99</span>
        </div>

        <div class="summary-item">
            <span>Tax (8%)</span>
            <span>$1.36</span>
        </div>

        <hr>

        <div class="summary-item" style="font-size:18px;">
            <b>Total</b>
            <b>$18.35</b>
        </div>
    </div>
</div>

</div>

<div style="padding:0 30px 30px;">
    <button type="submit">Place Order</button>
</div>

</form>

<script>
function selectOrder(type){
    let cards = document.querySelectorAll('.card');
    cards.forEach(c => c.classList.remove('active'));

    document.getElementById("orderType").value = type;

    if(type === 'dine'){
        cards[0].classList.add('active');
        document.getElementById('dineInfo').style.display = 'block';
        document.getElementById('takeawayInfo').style.display = 'none';
    } else {
        cards[1].classList.add('active');
        document.getElementById('dineInfo').style.display = 'none';
        document.getElementById('takeawayInfo').style.display = 'block';
    }
}

function selectPay(index){
    let payboxes = document.querySelectorAll('.paybox');
    payboxes.forEach(p => p.classList.remove('active'));
    payboxes[index].classList.add('active');

    let types = ['card','cash','online'];
    document.getElementById("paymentType").value = types[index];
}

function validateForm(){
    let name = document.getElementById("name").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let addressField = document.getElementById("address");

    let namePattern = /^[A-Za-z ]+$/;
    if(!namePattern.test(name)){
        alert("Name should contain only letters!");
        return false;
    }

    let phonePattern = /^[0-9]{10}$/;
    if(!phonePattern.test(phone)){
        alert("Phone number must be exactly 10 digits!");
        return false;
    }

    if(addressField && addressField.value.trim() !== ""){
        let addressPattern = /^[A-Za-z ]+$/;
        if(!addressPattern.test(addressField.value.trim())){
            alert("Address should contain only letters!");
            return false;
        }
    }

    return true;
}
</script>

</body>
</html>
