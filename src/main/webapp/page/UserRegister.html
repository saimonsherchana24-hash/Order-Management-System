<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amici De Gusto - Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/UserResgister.css">
</head>
<body>

<!-- Full-page blurred background image -->
<div class="bg-layer">
    <img
            class="bg-image"
            src="../Resource/RegisterImage.png"
            alt="Restaurant table with pizza and pasta"
    />
</div>

<!-- Page content overlay -->
<div class="page">

    <!-- Brand name at top -->
    <div class="brand-top">
        <span class="brand-name-top">AMICI DE GUSTO</span>
    </div>

    <!-- Transparent blur register card -->
    <div class="register-card">

        <!-- Card heading -->
        <h1 class="card-heading">Create Account</h1>

        <!-- Register form -->
        <form class="register-form" autocomplete="off">

            <!-- Full Name input -->
            <div class="field">
                <label class="field-label" for="fullname">Full Name</label>
                <div class="field-input-wrap">
                    <svg class="field-icon" viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <input
                            class="field-input"
                            type="text"
                            id="fullname"
                            placeholder="Enter your full name"
                            autocomplete="off"
                    />
                </div>
            </div>

            <!-- Email Address input -->
            <div class="field">
                <label class="field-label" for="email">Email Address</label>
                <div class="field-input-wrap">
                    <svg class="field-icon" viewBox="0 0 24 24">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                    <input
                            class="field-input"
                            type="email"
                            id="email"
                            placeholder="Enter your email address"
                            autocomplete="off"
                    />
                </div>
            </div>

            <!-- Password + Confirm Password in same row -->
            <div class="field-row">

                <!-- Password input -->
                <div class="field field-half">
                    <label class="field-label" for="password">Password</label>
                    <div class="field-input-wrap">
                        <svg class="field-icon" viewBox="0 0 24 24">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input
                                class="field-input"
                                type="password"
                                id="password"
                                placeholder="Create password"
                                autocomplete="off"
                        />
                    </div>
                </div>

                <!-- Confirm Password input -->
                <div class="field field-half">
                    <label class="field-label" for="confirm-password">Confirm Password</label>
                    <div class="field-input-wrap">
                        <svg class="field-icon" viewBox="0 0 24 24">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input
                                class="field-input"
                                type="password"
                                id="confirm-password"
                                placeholder="Confirm password"
                                autocomplete="off"
                        />
                    </div>
                </div>

            </div>

            <!-- Create Account button with arrow -->
            <button type="submit" class="btn-create">
                Create Account
                <svg class="btn-arrow" viewBox="0 0 24 24">
                    <line x1="5" y1="12" x2="19" y2="12"/>
                    <polyline points="12 5 19 12 12 19"/>
                </svg>
            </button>

            <!-- Login link -->
            <p class="login-link-text">
                Already have an account? 
                <span class="login-link">Log in here</span>
            </p>

        </form>
    </div>

    <!-- Copyright footer -->
    <div class="page-footer">
        <span>&copy; 2024 AMICI DE GUSTO</span>
    </div>

</div>

</body>
</html>
