<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amici De Gusto - Admin Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/adminLogin.css">
</head>
<body>

<!-- Restaurant Background -->
<div class="bg-restaurant"></div>

<!-- Login Card -->
<div class="login-wrapper">
    <div class="login-card">

        <!-- Shield Icon -->
        <div class="shield-icon">
            <svg viewBox="0 0 24 24">
                <path d="M12 2L3 7v5c0 5.25 3.83 10.15 9 11.25C17.17 22.15 21 17.25 21 12V7l-9-5z"/>
                <path d="M9 12l2 2 4-4"/>
            </svg>
        </div>

        <!-- Header -->
        <div class="card-header">
            <span class="brand-label">Amici De Gusto</span>
            <h1 class="card-title">Management</h1>
            <p class="card-subtitle">
                <span>Admin Access</span><br>
                Please authenticate to access the terminal.
            </p>
        </div>

        <!-- Form -->
        <form autocomplete="off">

            <!-- Admin ID -->
            <div class="form-group">
                <label class="form-label" for="admin-id">Admin ID or Email</label>
                <div class="input-wrapper">
                    <input
                            class="form-input"
                            type="text"
                            id="admin-id"
                            placeholder="Enter your admin ID or email"
                            autocomplete="off"
                    />
                    <svg class="input-icon" viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="input-wrapper">
                    <input
                            class="form-input"
                            type="password"
                            id="password"
                            placeholder="Enter your password"
                            autocomplete="off"
                    />
                    <svg class="input-icon" viewBox="0 0 24 24">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </div>
            </div>

            <!-- Forgot -->
            <div class="options-row">
                <a href="#" class="forgot-link">FORGOT?</a>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-authorize">
                AUTHORIZE ACCESS
                <svg class="btn-arrow" viewBox="0 0 24 24">
                    <line x1="5" y1="12" x2="19" y2="12"/>
                    <polyline points="12 5 19 12 12 19"/>
                </svg>
            </button>

        </form>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Card Footer -->
        <div class="card-footer">
            <a href="#" class="footer-link">Support</a>
            <a href="#" class="footer-link">Privacy</a>
        </div>

    </div>
</div>

<!-- Page Footer -->
<div class="page-footer">
    <span>&copy; 2026 Amici De Gusto</span>
</div>

</body>
</html>
